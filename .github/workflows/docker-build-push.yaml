name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  get-changes:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.get-changes.outputs.files }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: get-changes
        run: |
          CHANGES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
  
  build-and-push:
    needs: get-changes

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: tlxxzj/terraform-providers-mirror
            dockerfile: ./terraform-providers-mirror/Dockerfile
            context: ./terraform-providers-mirror
            path_prefix: terraform-providers-mirror/


    steps:
      - name: Exit early if no changes
        if: ${{ !contains(needs.get-changes.outputs.files, matrix.path_prefix) }}
        run: |
          echo "No changes in ${{matrix.path_prefix}}, skipping build and push."
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@v4

        # Required for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

        # Will generate tags for the image
        # For ref/tags/*: latest, <tag> 
        # For refs/heads/main: main, main-<short-sha>
      - name: Generate Metadata and Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}-{{branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}-{{sha}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: ${{ contains(needs.get-changes.outputs.files, matrix.path_prefix) }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Use github actions cache: https://docs.docker.com/build/cache/backends/gha/
          cache-from: type=gha
          cache-to: type=gha,mode=max
